<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        /* 기본 스타일 설정 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 카드 컨테이너 */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        /* 프로필 이미지(또는 아이콘) */
        .profile-img {
            width: 100px;
            height: 100px;
            background: #007bff;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;
        }

        h1 { margin: 0.5rem 0; color: #222; }
        p { color: #666; margin-bottom: 1.5rem; }

        /* 버튼 스타일 */
        .links { display: flex; flex-direction: column; gap: 10px; }
        .link-btn {
            text-decoration: none;
            background: #24292e;
            color: white;
            padding: 12px;
            border-radius: 8px;
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
        }
        .link-btn:hover {
            background: #444;
            transform: translateY(-2px);
        }
        .link-btn.blog { background: #00c73c; } /* 네이버 블로그 등 초록색 */

        /* 푸터 */
        footer { margin-top: 2rem; font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-img">👋</div>
    <h1>안녕하세요, [이름]입니다</h1>
    <p>여기에 자신을 소개하는 간단한 한 줄 문구를 적어주세요. <br> 깃허브 페이지에 오신 것을 환영합니다!</p>
    
    <div class="links">
        <a href="https://github.com/자신의아이디" class="link-btn" target="_blank">GitHub 바로가기</a>
        <a href="#" class="link-btn blog" target="_blank">Blog 방문하기</a>
        <a href="mailto:email@example.com" class="link-btn">Contact Me</a>
    </div>

    <footer>
        © 2024 [이름]. Built with HTML & CSS.
    </footer>
</div>

</body>
</html>
